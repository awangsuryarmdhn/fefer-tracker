name: Deploy Deno
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Require DENO_PROJECT
        env:
          DENO_PROJECT: ${{ secrets.DENO_PROJECT }}
        run: |
          if [ -z "${DENO_PROJECT}" ]; then
            echo "Set GitHub secret DENO_PROJECT to the Deno Deploy project name (non-empty)."
            exit 1
          fi
      - name: Deploy to Deno Deploy
        uses: denoland/deployctl@v1
        with:
          project: ${{ secrets.DENO_PROJECT }}
          entrypoint: main.ts
          # Prefer OIDC (id-token) when project linked to GitHub.
          # Fallback classic token:
          # token: ${{ secrets.DENO_DEPLOY_TOKEN }}
          # Do NOT pass env vars here. Defaults live in main.ts.
          # Empty env keys → API error: envVars[0].key too_small